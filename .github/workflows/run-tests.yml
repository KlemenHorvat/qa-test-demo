name: API Tests
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker image
        run: docker build -t api-tests .
      - name: Run tests
        run: docker run --rm -v $PWD/test-report:/app/report api-tests pytest tests/ --html=report/report.html --self-contained-html
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report/
